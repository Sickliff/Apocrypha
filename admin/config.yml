backend:
  name: github
  repo: Sickliff/Apocrypha
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

public_folder: "docs"
media_folder: "docs/assets"
publish_mode: editorial_workflow

collections:
  - name: "glitches"
    label: "Glitches"
    folder: "docs/glitches"
    create: true
    slug: "{{slug}}"
    
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Publish Date", name: "date", widget: "string"}
